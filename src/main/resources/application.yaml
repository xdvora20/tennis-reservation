spring:
  application:
    name: tennis-reservation

  datasource:
    url: jdbc:h2:mem:tennisdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  init-data: true
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-prod-very-long-256-bit-secret-key-value-0123456789}
      access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:PT15M}
      refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:P7D}