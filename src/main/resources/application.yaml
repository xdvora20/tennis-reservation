spring:
  application:
    name: tennis-reservation

  datasource:
    url: jdbc:h2:mem:tennisdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  init-data: true
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-prod-very-long-256-bit-secret-key-value-0123456789}
      access-token-expiration: PT15M
      refresh-token-expiration: P7D